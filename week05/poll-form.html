<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>
<body>
    <main>
        <form>
            <div class="form-item column2">
                <label>Full Name: <input type="text" id="fullname" name="fullname" required></label>
            </div>
            <div class="form-item column2"
                <label>Email: <input type="email" id="useremail" name="useremail" required></label>
            </div>

            <div class="form-item column1">
                <label>What is your favorite internet browser?: <select id="browser" name="browser">
                <option value="chrome">Chrome</option>
                <option value="firefox">Firefox</option>
                <option value="edge">Edge</option>
                <option value="brave">Brave</option>
                <option value="other">Other</option>
                </select>
                </label>
            </div>
            <label>Do you have a household pet?: <input type="checkbox" id="pe" name="pet"></label>

            <label>List the places you have lived. <textarea id="feedback" name="feedback" rows="4"></textarea></label>
            <button type="submit">Submit Poll</button>
        </form>
    </main>
    
</body>
</html>
