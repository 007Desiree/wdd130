<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting</title>
    <meta name="description"
      content="Contact us for more information about our world class water rafting services. We provide premium fun recreational rafting service for you and your family!">
    <meta name="author" content="Captain Ehoda">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="White Water Rafting Logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h1>White Water Rafting Company</h1>
            <div class="contact">
                <p>Lekki - Epe Expy, Ajah, Lagos</p>
                <p>+1 999 999 9999</p>
                <p>info@whitewater.com</p>
            </div>
            <div class="form-data">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1090.5435158838884!2d3.581171066275077!3d6.4700952153854825!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x103bf9fd578d7f91%3A0xf9780d70930c8c77!2sColors%20by%20Fouani!5e1!3m2!1sen!2sng!4v1775915014250!5m2!1sen!2sng" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                
                <form class="contact-form">
                    <div class="input-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Enter your name">
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email">
                    </div>

                    <div class="radio-group">
                        <span class="label">Message Purpose</span>
                        <div class="options">
                        <label><input type="radio" name="purpose" value="general"> General Inquiry</label>
                        <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
                        <label><input type="radio" name="purpose" value="website"> Website Suggestion</label>
                        </div>
                    </div>

                    <div class="input-group vertical">
                        <label for="message">Message</label>
                        <textarea id="message" placeholder="Type here"></textarea>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="subscribe" checked>
                        <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
                    </div>

                    <button type="submit" class="submit-btn">Get in Touch!</button>
                </form>
            </div>
        </section>
        <section>
            <h2>We Are Here to Serve You</h2>
            <div class="employees">
                <figure>
                    <img src="images/john_doe.jpg" alt="picture of employee">
                    <figcaption>John Doe</figcaption>
                </figure>
                <figure>
                    <img src="images/jane_doe.jpg" alt="picture of employee">
                    <figcaption>Jane Doe</figcaption>
                </figure>
                <figure>
                    <img src="images/john_appleseed.jpg" alt="picture of employee">
                    <figcaption>John Appleseed</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©2026 | White Water Rafting | Captain Ehoda</p>
        <nav class="socialmedia">
            <a href="https://facbook.com"><img src="images/facebook.webp"
                  alt="facbook blue logo"></a>
            <a href="https://x.com"><img src="images/x-logo.png" alt="x formerly twitter logo"></a>
            <a href="https://tiktok.com"><img src="images/tiktok.webp" alt="tiktok round logo"></a>
        </nav>
    </footer>
</body>

</html>
